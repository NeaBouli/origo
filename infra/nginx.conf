server {
    listen 80;
    server_name origo.app www.origo.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name origo.app www.origo.app;

    ssl_certificate     /etc/letsencrypt/live/origo.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/origo.app/privkey.pem;

    # Static Web Client
    root /var/www/origo;
    index index.html;
    try_files $uri $uri/ /index.html;

    # API + WebSocket Proxy
    location /api/ {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /ws {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    location /health {
        proxy_pass http://localhost:3000;
    }
}
