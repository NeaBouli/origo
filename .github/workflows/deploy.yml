name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and test
        run: |
          npm ci
          npm test

      - name: Deploy via SSH
        if: ${{ secrets.HETZNER_HOST != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.HETZNER_HOST }}
          username: origo
          key:      ${{ secrets.HETZNER_SSH_KEY }}
          script:   /opt/origo/infra/scripts/deploy.sh

      - name: Health check
        if: ${{ secrets.HETZNER_HOST != '' }}
        run: |
          sleep 5
          curl -f https://origo.app/health
